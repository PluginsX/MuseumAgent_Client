<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- ======================================== -->
    <!-- ✅ 全局禁用画中画和悬浮播放功能 -->
    <!-- ======================================== -->
    
    <!-- X5 内核禁用（小米、QQ 浏览器等） -->
    <meta name="x5-video-player-type" content="inline">
    <meta name="x5-video-player-fullscreen" content="false">
    <meta name="x5-playsinline" content="true">
    <meta name="x5-video-orientation" content="portraint">
    
    <!-- iOS Safari 内联播放 -->
    <meta name="format-detection" content="telephone=no">
    
    <!-- Android WebView 禁用悬浮 -->
    <meta name="x5-page-mode" content="app">
    <meta name="applicable-device" content="mobile">
    
    <!-- 禁止自动全屏和画中画 -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    
    <!-- 安全策略：禁止媒体全屏 API -->
    <!-- 注意：frame-ancestors 不能通过 meta 标签设置，需要服务器配置 -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; media-src 'self' blob:; worker-src 'self' blob:; object-src 'none';">
    
    <title>MuseumAgent</title>
    <link rel="icon" href="res/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./src/styles.css">
</head>
<body>

    <!-- ======================================== -->
    <!-- ✅ 全局禁用画中画和悬浮播放（最高优先级） -->
    <!-- ======================================== -->
    <script>
        (function() {
            'use strict';
            
            console.log('[GlobalPiPBlocker] 🚫 启动全局画中画/悬浮播放禁用器');
            
            // 1. 拦截 HTMLVideoElement 的原型方法（使用包装方式，避免直接重写只读属性）
            const originalVideoPrototype = HTMLVideoElement.prototype;
            const originalRequestPiP = originalVideoPrototype.requestPictureInPicture;
            
            if (originalRequestPiP) {
                try {
                    // 尝试重写原型方法（某些浏览器可能不允许）
                    Object.defineProperty(originalVideoPrototype, 'requestPictureInPicture', {
                        value: async function() {
                            console.error('[GlobalPiPBlocker] ⛔ 画中画功能已被全局禁用！');
                            alert('⛔ 画中画功能已被禁用\n视频必须在 Unity 内部完整播放\n此功能不适用于本项目');
                            throw new Error('[GlobalPiPBlocker] 画中画功能已被禁用');
                        },
                        writable: false,
                        configurable: true
                    });
                    console.log('[GlobalPiPBlocker] ✓ requestPictureInPicture 已拦截');
                } catch (error) {
                    console.warn('[GlobalPiPBlocker] ⚠️ 无法重写原型方法，使用包装方式:', error);
                    // 如果无法重写，我们只能通过事件拦截和属性设置来限制
                    console.log('[GlobalPiPBlocker] ℹ️ 将通过其他方式限制画中画功能');
                }
            }
            
            // 2. 禁用 disablePictureInPicture 属性（使用包装方式）
            try {
                Object.defineProperty(originalVideoPrototype, 'disablePictureInPicture', {
                    get: function() {
                        return true;
                    },
                    set: function(value) {
                        console.warn('[GlobalPiPBlocker] ⚠️ 尝试修改 disablePictureInPicture 被忽略');
                    },
                    configurable: true
                });
                console.log('[GlobalPiPBlocker] ✓ disablePictureInPicture 已锁定为 true');
            } catch (error) {
                console.warn('[GlobalPiPBlocker] ⚠️ 无法重写 disablePictureInPicture 属性:', error);
            }
            
            // 3. 拦截 Document 的 pictureInPictureEnabled 属性
            const originalDocument = document;
            Object.defineProperty(originalDocument.constructor.prototype, 'pictureInPictureEnabled', {
                get: function() {
                    return false;
                },
                configurable: true
            });
            console.log('[GlobalPiPBlocker] ✓ document.pictureInPictureEnabled 已设为 false');
            
            // 4. 阻止 enterpictureinpicture 事件
            document.addEventListener('enterpictureinpicture', function(e) {
                console.error('[GlobalPiPBlocker] ⚠️ 检测到画中画模式被触发！');
                e.preventDefault();
                e.stopPropagation();
                
                // 立即退出画中画
                if (document.pictureInPictureElement) {
                    document.exitPictureInPicture().catch(() => {});
                }
                
                alert('⛔ 画中画功能已被禁用\n视频必须在 Unity 内部完整播放');
                return false;
            }, true);
            console.log('[GlobalPiPBlocker] ✓ enterpictureinpicture 事件已拦截');
            
            // 5. 全局阻止右键菜单（web-mode 下允许，用于聊天面板的输入框粘贴）
            document.addEventListener('contextmenu', function(e) {
                if (document.body.classList.contains('web-mode')) {
                    return; // web-mode 下允许右键菜单（粘贴等操作）
                }
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, true);
            console.log('[GlobalPiPBlocker] ✓ 右键菜单已全局阻止（web-mode 下放行）');
            
            // 6. 拦截所有 video 元素的创建（使用包装方式）
            const originalCreateElement = document.createElement.bind(document);
            document.createElement = function(tagName, options) {
                const element = originalCreateElement(tagName, options);
                
                if (tagName.toLowerCase() === 'video') {
                    console.log('[GlobalPiPBlocker] ℹ️ 检测到新创建的 video 元素');
                    
                    try {
                        // 尝试重写实例方法
                        Object.defineProperty(element, 'disablePictureInPicture', {
                            get: function() {
                                return true;
                            },
                            set: function(value) {
                                console.warn('[GlobalPiPBlocker] ⚠️ 尝试修改 disablePictureInPicture 被忽略');
                            },
                            configurable: true
                        });
                        
                        if ('requestPictureInPicture' in element) {
                            element.requestPictureInPicture = async function() {
                                console.error('[GlobalPiPBlocker] ⛔ 画中画功能已被全局禁用！');
                                alert('⛔ 画中画功能已被禁用\n视频必须在 Unity 内部完整播放');
                                throw new Error('[GlobalPiPBlocker] 画中画功能已被禁用');
                            };
                        }
                    } catch (error) {
                        console.warn('[GlobalPiPBlocker] ⚠️ 无法重写实例属性，仅设置 HTML 属性:', error);
                    }
                    
                    // 设置内联播放属性（这些总是有效的）
                    element.setAttribute('playsinline', '1');
                    element.setAttribute('webkit-playsinline', '1');
                    element.setAttribute('x5-playsinline', '1');
                    element.setAttribute('x5-video-player-type', 'inline');
                    element.setAttribute('x5-video-player-fullscreen', 'false');
                    element.setAttribute('disablepictureinpicture', 'true');
                    
                    // 阻止右键菜单
                    element.addEventListener('contextmenu', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        return false;
                    }, true);
                }
                
                return element;
            };
            console.log('[GlobalPiPBlocker] ✓ document.createElement 已拦截');
            
            console.log('[GlobalPiPBlocker] ✅ 全局禁用器初始化完成');
            console.log('[GlobalPiPBlocker] ⚠️ 画中画和悬浮播放功能已彻底禁用');

            // ======================================================
            // ✅ 键盘守卫：在页面最早期 patch EventTarget.prototype.addEventListener
            // 目的：拦截 Unity WebGL 注册的所有键盘监听器（无论注册在 window/document/canvas）
            //       当浮动面板打开（body.web-mode）且焦点在面板内时，跳过 Unity 的键盘处理，
            //       使面板内的输入框可以正常接收英文/退格/大写等所有按键。
            // 原理：patch EventTarget.prototype.addEventListener（所有 addEventListener 调用
            //       的底层实现），这样无论 Unity 用哪个对象注册键盘事件都会被拦截。
            // ======================================================
            (function patchKeyboardForUnity() {
                const _origAEL = EventTarget.prototype.addEventListener;
                const _origREL = EventTarget.prototype.removeEventListener;

                // 键盘事件类型集合
                const KEY_EVENTS = new Set(['keydown', 'keyup', 'keypress']);
                
                // 用 WeakMap 存储 原始listener -> 包装listener 的映射，供 removeEventListener 使用
                const _wrapperMap = new WeakMap();

                EventTarget.prototype.addEventListener = function(type, listener, options) {
                    if (KEY_EVENTS.has(type) && typeof listener === 'function') {
                        // 检查是否已有包装（避免重复包装）
                        let wrappers = _wrapperMap.get(listener);
                        if (!wrappers) {
                            wrappers = new Map();
                            _wrapperMap.set(listener, wrappers);
                        }
                        
                        const target = this;
                        if (!wrappers.has(target)) {
                            const wrapped = function(e) {
                                // 判断：body 有 web-mode 类 且 焦点在浮动面板内
                                const panel = document.querySelector('.floating-panel');
                                if (
                                    document.body && 
                                    document.body.classList.contains('web-mode') &&
                                    panel &&
                                    panel.contains(document.activeElement)
                                ) {
                                    // 面板打开且焦点在内：跳过此键盘回调
                                    return;
                                }
                                // 否则正常执行原始监听器
                                listener.call(this, e);
                            };
                            wrappers.set(target, wrapped);
                        }
                        
                        _origAEL.call(this, type, wrappers.get(target), options);
                    } else {
                        _origAEL.call(this, type, listener, options);
                    }
                };

                EventTarget.prototype.removeEventListener = function(type, listener, options) {
                    if (KEY_EVENTS.has(type) && typeof listener === 'function') {
                        const wrappers = _wrapperMap.get(listener);
                        const wrapped = wrappers && wrappers.get(this);
                        _origREL.call(this, type, wrapped || listener, options);
                    } else {
                        _origREL.call(this, type, listener, options);
                    }
                };

                console.log('[KeyboardGuard] ✅ EventTarget.prototype.addEventListener 已 patch，Unity 全部键盘监听器将被守卫拦截');
            })();
            // ======================================================
            
        })();
    </script>
    <!-- ======================================== -->
    
    <!-- 使用 SDK 构建产物 -->
    <script src="./lib/museum-agent-sdk.min.js"></script>
    <div id="app"></div>

    <!-- 加载公共函数 -->
    <script type="module" src="./src/commonFunction.js"></script>
    
    <!-- 加载应用 -->
    <script type="module" src="./src/app.js"></script>

</body>
</html>
